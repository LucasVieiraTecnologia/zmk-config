# --- display
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# --- power / sleep
CONFIG_PM=y
CONFIG_ZMK_SLEEP=y
# 3 minutos em ms
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=180000

# --- bluetooth
CONFIG_BT=y
CONFIG_BT_DIS=y
CONFIG_ZMK_BLE=y
CONFIG_BT_PERIPHERAL=y   # <- se der erro no build, comente essa linha

# --- studio
CONFIG_ZMK_STUDIO=y

# --- log/debug
CONFIG_LOG=y
CONFIG_USB_DEVICE_STACK=y

# --- Displays OLED ---
CONFIG_ZMK_DISPLAY=y
CONFIG_DISPLAY=y
CONFIG_SSD1306=y

# --- Encoders ---
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# --- Energia / Sleep ---
CONFIG_PM=y
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=600000

# --- Bluetooth ---
CONFIG_BT=y
CONFIG_BT_CENTRAL=n
CONFIG_BT_DIS=y
CONFIG_ZMK_BLE=y
# Configurações do fork comentadas para oficial:
# CONFIG_ZMK_BLE_PERIPHERAL=y
# CONFIG_ZMK_SPLIT_BLE_ROLE_PERIPHERAL=y
# CONFIG_ZMK_REPORTING=y

# --- ZMK Studio ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO=y

# --- Split com fio (P2) ---
CONFIG_ZMK_SPLIT_WIRED=y

# --- Driver I2C (geralmente já habilitado via .overlay) ---
CONFIG_I2C=y

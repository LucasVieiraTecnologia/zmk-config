# ==========================================================
# Configurações para o Display OLED (ADICIONAR/VERIFICAR ESTAS LINHAS)
# ==========================================================
CONFIG_ZMK_DISPLAY=y              # Habilita o subsistema de display do ZMK
CONFIG_ZMK_LVGL=y                 # Habilita a biblioteca LVGL para gráficos
CONFIG_LV_COLOR_DEPTH_1=y         # Define a profundidade de cor para 1 bit (monocromático: preto e branco)
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y # Habilita uma fonte padrão. Crucial se ZMK usa para texto.
CONFIG_LV_MEM_SIZE=16384          # Define o tamanho da memória de heap para o LVGL (16KB).
                                  # Se tiver problemas de memória ou seu GIF for muito complexo, pode tentar 32768 (32KB).

CONFIG_ZMK_DISPLAY_SSD1306=y      # Habilita o driver específico para o chip SSD1306 (comum em OLEDs)
CONFIG_SSD1306_DEFAULT_HEIGHT=128 # Altura do seu OLED (128 pixels, como confirmado)
CONFIG_SSD1306_DEFAULT_WIDTH=32   # Largura do seu OLED (32 pixels, como confirmado)

CONFIG_ZMK_WIDGET_ANIMATION=y     # Habilita o seu widget de animação personalizado no ZMK
                                  # O nome aqui deve ser o mesmo que você usou em ZMK_WIDGET_BUILDER(animation_widget, ...)
# ==========================================================


# ==========================================================
# Outras configurações (MANTENHA SUAS CONFIGURAÇÕES EXISTENTES)
# ==========================================================
# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- Configurações para garantir suporte USB Serial (COM) ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

# --- Tenta desabilitar o bloqueio inicial do ZMK Studio (OPÇÃO MAIS RECENTE) ---
CONFIG_ZMK_STUDIO_LOCKING=n

# --- Habilita o ZMK Studio (já habilitado via build.yaml, mas pode ficar aqui) ---
CONFIG_ZMK_STUDIO=y

# --- Habilita o split com fio via cabo P2 ---
CONFIG_ZMK_SPLIT_WIRED=y

# --- Habilita o driver I2C (geralmente já habilitado pelo .overlay) ---
CONFIG_I2C=y

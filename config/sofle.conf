# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Tempo em milissegundos para o teclado ser considerado "ocioso" (5 segundos)
CONFIG_ZMK_IDLE_TIMEOUT=5000

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- Configurações para garantir suporte USB Serial (COM) ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

# Opcional: Se ainda tiver problemas com o USB, tente desabilitar o gerenciamento de energia para depuração
# CONFIG_PM_DEVICE_RUNTIME_SUSPEND_IDLE=n
# CONFIG_PM_DEVICE=n

# --- Tenta desabilitar o bloqueio inicial do ZMK Studio (OPÇÃO MAIS RECENTE) ---
CONFIG_ZMK_STUDIO_LOCKING=n

# --- Habilita o ZMK Studio (já habilitado via build.yaml, mas pode ficar aqui) ---
CONFIG_ZMK_STUDIO=y

# --- Habilita o split com fio via cabo P2 ---
CONFIG_ZMK_SPLIT_WIRED=y

# --- Habilita o driver I2C (geralmente já habilitado pelo .overlay) ---
CONFIG_I2C=y
# Define o tamanho do buffer de display. 512 bytes é 128x32 / 8 bits/byte.
# CONFIG_DISPLAY_BUFFER_SIZE=512

# --- CONFIGURAÇÕES PARA O DISPLAY OLED EMBUTIDAS NO KCONFIG ---
# Estas linhas incorporam a configuração do Devicetree do OLED diretamente no Kconfig.
# Isso contorna problemas de análise de arquivos .overlay externos.
CONFIG_ZMK_DTS_OVERLAY_FILE="boards/nice_nano_v2_oled.overlay" # Nome arbitrário, mas necessário para o ZMK
CONFIG_ZMK_DTS_OVERLAY="
/ {
    chosen { zmk,display = &oled; };
    &i2c0 {
        oled: oled@3c {
            compatible = \"solomon,sh1106fb\"; # <-- MUITO PROVAVELMENTE É ESTE! Se for SSD1306, mude para \"solomon,ssd1306fb\"
            reg = <0x3c>;
            width = <128>;
            height = <32>;
            segment-offset = <0>;
            page-offset = <0>;
            display-offset = <0>;
            multiplex-ratio = <31>; # (height - 1)
            com-pm = <0x12>;
            segment-remap;
            com-invdir;
            read-modify-write;
            prechargep = <0x22>;
        };
    };
};
"

# --- Configurações Kconfig para o Sofle (para definir símbolos que estavam dando erro) ---
# Estas linhas são CRUCIAIS e devem estar aqui para que o ZMK reconheça os símbolos.
CONFIG_ZMK_DISPLAY_STATUS=y
CONFIG_ZMK_ACTIVITY=y

CONFIG_ZMK_LOG_LEVEL=4 # Define o nível de log geral para Debug (DBG)
CONFIG_ZMK_DISPLAY_LOG_LEVEL=4 # Nível de log para o módulo de display
CONFIG_ZMK_ACTIVITY_LOG_LEVEL=4 # Nível de log para o módulo de atividade

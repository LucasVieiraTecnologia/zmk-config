# Uncomment the following line to enable the Sofle OLED Display
CONFIG_ZMK_DISPLAY=y

# Tempo em milissegundos para o teclado ser considerado "ocioso" (5 segundos)
CONFIG_ZMK_IDLE_TIMEOUT=5000

# Uncomment these two lines to add support for encoders
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- Configurações para garantir suporte USB Serial (COM) ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

# Opcional: Se ainda tiver problemas com o USB, tente desabilitar o gerenciamento de energia para depuração
# CONFIG_PM_DEVICE_RUNTIME_SUSPEND_IDLE=n
# CONFIG_PM_DEVICE=n

# --- Tenta desabilitar o bloqueio inicial do ZMK Studio (OPÇÃO MAIS RECENTE) ---
CONFIG_ZMK_STUDIO_LOCKING=n

# --- Habilita o ZMK Studio (já habilitado via build.yaml, mas pode ficar aqui) ---
CONFIG_ZMK_STUDIO=y

# --- Habilita o split com fio via cabo P2 ---
CONFIG_ZMK_SPLIT_WIRED=y

# --- Habilita o driver I2C (geralmente já habilitado pelo .overlay) ---
CONFIG_I2C=y
# Define o tamanho do buffer de display. 512 bytes é 128x32 / 8 bits/byte.
# CONFIG_DISPLAY_BUFFER_SIZE=512

# --- Configurações de Kconfig para o Display e Atividade (definidas em prj.conf, habilitadas aqui) ---
# Essas linhas DEVEM ESTAR AQUI para habilitar os recursos,
# e as definições dos símbolos ZMK_DISPLAY_STATUS e ZMK_ACTIVITY
# devem estar no zmk-config/config/prj.conf
CONFIG_ZMK_DISPLAY_STATUS=y
CONFIG_ZMK_ACTIVITY=y
CONFIG_ZMK_LOG_LEVEL_DBG=y # Habilita o nível de depuração para ZMK_LOG_LEVEL

# Os níveis de log de módulos específicos (DISPLAY, ACTIVITY) são habilitados por esta flag geral e pelo prj.conf
# NÃO COLOQUE OS LOG_LEVEL_DBG ESPECÍFICOS DE MÓDULOS AQUI NO SOFLE.CONF
# (Eles serão definidos no prj.conf e ativados por ZMK_LOG_LEVEL_DBG=y e as flags CONFIG_ZMK_DISPLAY e CONFIG_ZMK_ACTIVITY)

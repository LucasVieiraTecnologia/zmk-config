# ==========================================================
# ADICIONE ESTAS LINHAS AQUI (INÍCIO DO ARQUIVO)
# ==========================================================
# Inclui as Kconfigs dos módulos necessários para display e LVGL.
# Isso garante que os símbolos como ZMK_LVGL e SSD1306_DEFAULT_HEIGHT sejam definidos.
source "Kconfig.zephyr"
source "Kconfig.zmk"
# ==========================================================


# ==========================================================
# Configurações para o Display OLED (MANTENHA ESTAS COMO ESTÃO, SEM COMENTÁRIOS # NA MESMA LINHA)
# ==========================================================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_MEM_SIZE=16384

CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_HEIGHT=128
CONFIG_SSD1306_DEFAULT_WIDTH=32

CONFIG_ZMK_WIDGET_ANIMATION=y
# ==========================================================


# ==========================================================
# Outras configurações (Mantenha suas configurações existentes)
# ==========================================================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# CONFIG_ZMK_RGB_UNDERGLOW=y

# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

CONFIG_ZMK_STUDIO_LOCKING=n

CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_SPLIT_WIRED=y

CONFIG_I2C=y

# Inclui as Kconfigs dos módulos ZMK e Zephyr para garantir que todos os símbolos sejam definidos.
source "Kconfig.zephyr"
source "Kconfig.zmk"

# ==========================================================
# Configurações Adicionais para o Display OLED e Animação
# ==========================================================
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y # Fonte para LVGL, se necessário
CONFIG_LV_MEM_SIZE=16384 # Memória para LVGL. Pode aumentar se tiver pouca RAM.

CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_HEIGHT=128 # Altura do seu OLED
CONFIG_SSD1306_DEFAULT_WIDTH=32   # Largura do seu OLED

CONFIG_ZMK_WIDGET_ANIMATION=y # Habilita seu widget de animação

# Inclui as Kconfigs dos módulos ZMK e Zephyr para garantir que todos os símbolos sejam definidos.
source "Kconfig.zephyr"
source "Kconfig.zmk"

# ==========================================================
# Configurações para o Display OLED e Animação
# ==========================================================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_MEM_SIZE=16384

CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_HEIGHT=128
CONFIG_SSD1306_DEFAULT_WIDTH=32

CONFIG_ZMK_WIDGET_ANIMATION=y
CONFIG_ZMK_DISPLAY_CUSTOM_INIT=y # Habilita sua função de inicialização customizada

# Desabilitar Widgets de Display Padrão do ZMK (para dar lugar à animação)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM=n

# ==========================================================
# Outras configurações do seu teclado (CONTEÚDO ORIGINAL DEDUPLICADO)
# ==========================================================
# Copyright (c) 2020 Ryan Cross
# SPDX-License-Identifier: MIT

# OBS: O CONFIG_ZMK_DISPLAY=y já está definido acima. A linha duplicada foi removida.
# Você não precisa mais do comentário para "Uncomment the following line to enable the Sofle OLED Display" aqui.

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# CONFIG_ZMK_RGB_UNDERGLOW=y

# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- Configurações para garantir suporte USB Serial (COM) ---
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

# --- Tenta desabilitar o bloqueio inicial do ZMK Studio (OPÇÃO MAIS RECENTE) ---
CONFIG_ZMK_STUDIO_LOCKING=n

# --- Habilita o ZMK Studio (já habilitado via build.yaml, mas pode ficar aqui) ---
CONFIG_ZMK_STUDIO=y

# --- Habilita o split com fio via cabo P2 ---
CONFIG_ZMK_SPLIT_WIRED=y

# --- Habilita o driver I2C (geralmente já habilitado pelo .overlay) ---
CONFIG_I2C=y

# ==========================================================
# Configurações de Logging
# ==========================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=5
CONFIG_ZMK_LOG_LEVEL=5
CONFIG_ZMK_CUSTOM_DISPLAY_LOG_LEVEL=5

CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_UART_CONSOLE=y
CONFIG_STD_UART_BAUDRATE=115200
CONFIG_CDC_ACM_PORT="CDC_ACM_UART_0"
CONFIG_ZMK_USB_SERIAL=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_SUBSYS_UART=y
CONFIG_CONSOLE_SUBSYS_UART_0=y

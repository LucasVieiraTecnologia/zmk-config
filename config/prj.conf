# Custom Kconfig definitions for Sofle layout.
# These will be merged with the main prj.conf and should define symbols early.

CONFIG_ZMK_DISPLAY_STATUS=y
CONFIG_ZMK_ACTIVITY=y

CONFIG_ZMK_LOG_LEVEL=4 # Sets overall log level to Debug
CONFIG_ZMK_DISPLAY_LOG_LEVEL=4
CONFIG_ZMK_ACTIVITY_LOG_LEVEL=4

# Optionally, if DISPLAY_BUFFER_SIZE was causing issues:
# CONFIG_DISPLAY_BUFFER_SIZE=512

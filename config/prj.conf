# Inclui as Kconfigs dos módulos ZMK e Zephyr para garantir que todos os símbolos sejam definidos.
source "Kconfig.zephyr"
source "Kconfig.zmk"

# ==========================================================
# Configurações para o Display OLED
# ==========================================================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_MEM_SIZE=16384

CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_HEIGHT=128
CONFIG_SSD1306_DEFAULT_WIDTH=32

CONFIG_ZMK_WIDGET_ANIMATION=y
CONFIG_ZMK_DISPLAY_CUSTOM_INIT=y # Habilita sua função de inicialização customizada

# Desabilitar Widgets de Display Padrão do ZMK (para dar lugar à animação)
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n
CONFIG_ZMK_WIDGET_LAYER_STATUS=n
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n
CONFIG_ZMK_WIDGET_WPM=n

# ==========================================================
# Outras configurações do seu teclado
# ==========================================================
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_SPLIT_WIRED=y
CONFIG_I2C=y

# ==========================================================
# Configurações de Logging (ESTAS SÃO CRUCIAIS E MAIS VERBOSAS AGORA)
# ==========================================================
CONFIG_LOG=y                          # Habilita o subsistema de logging
CONFIG_LOG_DEFAULT_LEVEL=5            # Nível de log padrão: 5 = DEBUG (mais verboso)
CONFIG_ZMK_LOG_LEVEL=5                # Nível de log específico do ZMK: 5 = DEBUG
CONFIG_ZMK_CUSTOM_DISPLAY_LOG_LEVEL=5 # Seu módulo customizado também em DEBUG

CONFIG_LOG_BACKEND_UART=y             # Habilita o backend UART para o log
CONFIG_LOG_MODE_IMMEDIATE=y           # Manda os logs imediatamente (útil para boot)
# CONFIG_LOG_MODE_DEFERRED=n          # Certifique-se que o deferred não está ativo

# Configurações para o console serial USB
CONFIG_UART_CONSOLE=y                 # Habilita o console UART
CONFIG_STD_UART_BAUDRATE=115200       # Define o baudrate da UART
CONFIG_CDC_ACM_PORT="CDC_ACM_UART_0"  # Define a porta CDC ACM para o console
CONFIG_ZMK_USB_SERIAL=y               # Habilita a funcionalidade serial USB do ZMK

# Forçar subsistema de console a usar o backend USB CDC ACM
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_SUBSYS_UART=y
CONFIG_CONSOLE_SUBSYS_UART_0=y        # Garante que o console use a UART 0

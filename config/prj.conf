# Custom Kconfig definitions for Sofle layout.
# These will be merged with the main prj.conf and should define symbols early.

# Definições de Kconfig que estavam dando "undefined symbol"
CONFIG_ZMK_DISPLAY_STATUS=y
CONFIG_ZMK_ACTIVITY=y

# Níveis de log (4 = Debug, 3 = Info, 2 = Warning, 1 = Error)
CONFIG_ZMK_LOG_LEVEL=4 # Nível de log geral para depuração
CONFIG_ZMK_DISPLAY_LOG_LEVEL=4 # Nível de log para o módulo de display
CONFIG_ZMK_ACTIVITY_LOG_LEVEL=4 # Nível de log para o módulo de atividade

# Opcional: Descomente se tiver problemas de buffer de display
# CONFIG_DISPLAY_BUFFER_SIZE=512

# Configurações Kconfig para o Sofle
# Estas configurações são mescladas com o prj.conf principal do ZMK
# para garantir que os símbolos sejam definidos cedo no processo de build.

CONFIG_ZMK_DISPLAY_STATUS=y
CONFIG_ZMK_ACTIVITY=y

# Níveis de log para depuração. (4 = Debug)
CONFIG_ZMK_LOG_LEVEL=4
CONFIG_ZMK_DISPLAY_LOG_LEVEL=4
CONFIG_ZMK_ACTIVITY_LOG_LEVEL=4

# Opcional: Se CONFIG_DISPLAY_BUFFER_SIZE der problema, descomente:
# CONFIG_DISPLAY_BUFFER_SIZE=512

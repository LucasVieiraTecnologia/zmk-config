# ==========================================================
# Desabilitar Widgets de Display Padrão do ZMK (para dar lugar à animação)
# ==========================================================
CONFIG_ZMK_WIDGET_BATTERY_STATUS=n # Desabilita o status da bateria
CONFIG_ZMK_WIDGET_LAYER_STATUS=n   # Desabilita o status da camada (layer)
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=n  # Desabilita o status de saída (USB/BT)
CONFIG_ZMK_WIDGET_WPM=n            # Desabilita o widget de WPM
# Adicione mais conforme necessário se outros widgets padrão continuarem a aparecer
# CONFIG_ZMK_WIDGET_XXXX_STATUS=n

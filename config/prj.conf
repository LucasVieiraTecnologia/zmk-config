# Configurações Kconfig para o Sofle
# Estas configurações são mescladas com o prj.conf principal do ZMK
# para garantir que os símbolos sejam definidos cedo no processo de build.

# Habilita o subsistema de status do display
CONFIG_ZMK_DISPLAY_STATUS=y

# Habilita a detecção de atividade/inatividade
CONFIG_ZMK_ACTIVITY=y

# Níveis de log para depuração.
# Definimos o nível de log como um inteiro para evitar problemas de "choice symbol".
# 4 = Debug (DBG)
# Se você quiser menos logs, pode mudar para 3 (Info), 2 (Warning), 1 (Error).
CONFIG_ZMK_LOG_LEVEL=4
CONFIG_ZMK_DISPLAY_LOG_LEVEL=4
CONFIG_ZMK_ACTIVITY_LOG_LEVEL=4

# Adicione aqui outras configurações que você precisa que sejam lidas cedo,
# ou que estavam dando erro de "símbolo indefinido" em sofle.conf
# Por exemplo, se CONFIG_DISPLAY_BUFFER_SIZE der problema, descomente:
# CONFIG_DISPLAY_BUFFER_SIZE=512

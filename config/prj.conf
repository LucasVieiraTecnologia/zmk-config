# Configuração de Diagnóstico: Apenas para verificar o display padrão e logs.
source "Kconfig.zephyr"
source "Kconfig.zmk"

# ==========================================================
# Configurações BÁSICAS do Display (apenas o necessário para o ZMK padrão)
# ==========================================================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_MEM_SIZE=16384 # Mantenha o tamanho da memória para LVGL

CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_HEIGHT=128
CONFIG_SSD1306_DEFAULT_WIDTH=32

# DESABILITE sua animação e inicialização customizada TEMPORARIAMENTE para diagnóstico
CONFIG_ZMK_WIDGET_ANIMATION=n      # Desabilita seu widget customizado
CONFIG_ZMK_DISPLAY_CUSTOM_INIT=n   # Desabilita sua função de inicialização customizada

# HABILITE os widgets padrão do ZMK para ver se eles aparecem
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM=y

# ==========================================================
# Outras configurações do seu teclado (mantidas, mas sem modificações neste teste)
# ==========================================================
# Copyright (c) 2020 Ryan Cross
# SPDX-License-Identifier: MIT

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
# ... (O restante das suas configurações de encoder, RGB, USB, split, I2C que estavam no seu prj.conf)
# Certifique-se que o CONFIG_USB_DEVICE_STACK=y, CONFIG_SERIAL=y, CONFIG_USB_CDC_ACM=y, CONFIG_I2C=y estão aqui
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_SPLIT_WIRED=y
CONFIG_I2C=y

# ==========================================================
# Configurações de Logging (Mantenha estas para depuração)
# ==========================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=5 # DEBUG
CONFIG_ZMK_LOG_LEVEL=5     # DEBUG
# Opcional: CONFIG_ZMK_CUSTOM_DISPLAY_LOG_LEVEL=5 (pode remover se display_manager.c não for compilado)

CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_UART_CONSOLE=y
CONFIG_STD_UART_BAUDRATE=115200
CONFIG_CDC_ACM_PORT="CDC_ACM_UART_0"
CONFIG_ZMK_USB_SERIAL=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_SUBSYS_UART=y
CONFIG_CONSOLE_SUBSYS_UART_0=y

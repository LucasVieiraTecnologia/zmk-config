# ==========================================================
# Configurações para o Display OLED (Versão de Diagnóstico)
# ==========================================================
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_MEM_SIZE=16384

CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_HEIGHT=128
CONFIG_SSD1306_DEFAULT_WIDTH=32

# Desabilitamos a animação e inicialização customizada TEMPORARIAMENTE para diagnóstico
CONFIG_ZMK_WIDGET_ANIMATION=n
CONFIG_ZMK_DISPLAY_CUSTOM_INIT=n

# HABILITAMOS os widgets padrão do ZMK para ver se eles aparecem
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM=y

# ==========================================================
# Outras configurações do seu teclado (mantidas do original sofle.conf)
# ==========================================================
# Copyright (c) 2020 Ryan Cross
# SPDX-License-Identifier: MIT

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_SPLIT_WIRED=y
CONFIG_I2C=y

# ==========================================================
# Configurações de Logging (CRUCIAIS para ver o que acontece)
# ==========================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=5
CONFIG_ZMK_LOG_LEVEL=5

CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_STD_UART_BAUDRATE=115200
CONFIG_CDC_ACM_PORT="CDC_ACM_UART_0"
CONFIG_ZMK_USB_SERIAL=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_SUBSYS_UART=y
CONFIG_CONSOLE_SUBSYS_UART_0=y

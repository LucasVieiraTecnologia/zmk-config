# ==========================================================
# Configurações de Logging (para depuração)
# ==========================================================
CONFIG_LOG=y               # Habilita o subsistema de logging
CONFIG_LOG_DEFAULT_LEVEL=4 # Nível de log padrão (4 = INFO, 3 = DBG, 2 = WRN, 1 = ERR)
CONFIG_ZMK_LOG_LEVEL=4     # Nível de log específico do ZMK (para mensagens ZMK)

# Nível de log para o seu módulo customizado (zmk_custom_display, que registramos no display_manager.c)
CONFIG_ZMK_CUSTOM_DISPLAY_LOG_LEVEL=4

# Para ver logs no console USB Serial
CONFIG_UART_CONSOLE=y
CONFIG_CDC_ACM_PORT="CDC_ACM_UART_0" # Ou o nome da porta ACM que o seu board usa (geralmente este)
CONFIG_ZMK_USB_SERIAL=y # Habilita o ZMK USB serial, necessário para o console USB

# Ativa display OLED via LVGL
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_12=y
CONFIG_LV_MEM_SIZE=16384

# Configura display SSD1306 128x32 (largura x altura)
CONFIG_ZMK_DISPLAY_SSD1306=y
CONFIG_SSD1306_DEFAULT_WIDTH=128
CONFIG_SSD1306_DEFAULT_HEIGHT=32

# Widgets do display
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
CONFIG_ZMK_WIDGET_WPM=y

# Desativa animação para simplificar
CONFIG_ZMK_WIDGET_ANIMATION=n
CONFIG_ZMK_DISPLAY_CUSTOM_INIT=n

# Encoder EC11 (se estiver usando algum knob)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# USB / Serial
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
CONFIG_USB_CDC_ACM=y

CONFIG_ZMK_USB_SERIAL=y

# Console e logs
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_SUBSYS_UART=y
CONFIG_CONSOLE_SUBSYS_UART_0=y

CONFIG_LOG=y
CONFIG_LOG_LEVEL_DBG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

CONFIG_STD_UART_BAUDRATE=115200
CONFIG_CDC_ACM_PORT="CDC_ACM_UART_0"

# Split com cabo (wired split)
CONFIG_ZMK_SPLIT_WIRED=y

# I2C (necessário para OLED SSD1306)
CONFIG_I2C=y

# ZMK Studio (debug via USB)
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

name: Build ZMK firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:latest # Ou uma versão específica, como :2.6

    steps:
      - name: Checkout ZMK Config
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      # --- Construção da Metade ESQUERDA ---
      - name: West Build (Sofle Left)
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
          -DSHIELD=sofle_left \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Sofle Left UF2
        run: cp build/zephyr/zmk.uf2 sofle_left_nice_nano_v2.uf2

      - name: Archive Sofle Left Firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle_left_firmware
          path: sofle_left_nice_nano_v2.uf2

      # --- Construção da Metade DIREITA ---
      - name: West Build (Sofle Right)
        run: |
          west build --pristine -s zmk/app -b nice_nano_v2 -- \
          -DSHIELD=sofle_right \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Rename Sofle Right UF2
        run: cp build/zephyr/zmk.uf2 sofle_right_nice_nano_v2.uf2

      - name: Archive Sofle Right Firmware
        uses: actions/upload-artifact@v4
        with:
          name: sofle_right_firmware
          path: sofle_right_nice_nano_v2.uf2

# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
# ... (parte inicial do arquivo) ...
# ...
include:
  - board: nice_nano_v2
    shield: sofle_left
    snippet: studio-rpc-usb-uart
    # ATENÇÃO: A linha cmake-args: tem que ter UM ESPAÇO depois dos ":"
    # E a próxima linha (a que começa com -DZMK_CONFIG) tem que ter 6 ESPAÇOS de indentação
    # E a linha -DCONF_FILE tem que ter 6 ESPAÇOS de indentação
    cmake-args: >
          -DZMK_CONFIG=/tmp/zmk-config/config
          -DCONF_FILE=/tmp/zmk-config/config/prj.conf # <--- ESTA É A LINHA CRUCIAL!
          -DSHIELD=sofle_left
          -DZMK_EXTRA_MODULES=/__w/zmk-config/zmk-config
          -DCONFIG_ZMK_STUDIO=y
    sources:
      - display_manager.c
      - sofle_animation_widget.c

  - board: nice_nano_v2
    shield: sofle_right
    snippet: studio-rpc-usb-uart
    # Repita para o lado direito, se quiser o firmware para ele também
    cmake-args: >
          -DZMK_CONFIG=/tmp/zmk-config/config
          -DCONF_FILE=/tmp/zmk-config/config/prj.conf # <--- ESTA É A LINHA CRUCIAL!
          -DSHIELD=sofle_right
          -DZMK_EXTRA_MODULES=/__w/zmk-config/zmk-config
          -DCONFIG_ZMK_STUDIO=y
    sources:
      - display_manager.c
      - sofle_animation_widget.c
